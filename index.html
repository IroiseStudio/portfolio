<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Portfolio of Alban - Software Developer and Designer">
    <title>Alban | Portfolio</title>
    <!-- Boxicons for modern icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="css/style.css?v=12">
</head>
<body>

    <div class="container">
        <!-- About Me Header -->
        <header>
            <div class="profile-image-container">
                <img id="profile-img" src="" alt="Profile Picture">
            </div>
            <div class="header-content">
                <h1 id="profile-name"></h1>
                <p id="profile-bio"></p>
                <div id="profile-socials" class="social-links"></div>
            </div>
        </header>

        <!-- Projects Section -->
        <section class="projects-section">
            <h2 class="section-title">Selected Projects</h2>
            <div id="project-tag-sorter" class="project-tag-sorter"></div>
            
            <div id="projects-container">
                <!-- Projects will be dynamically injected here by main.js -->
            </div>
        </section>
    </div>

    <!-- Application Logic -->
    <script src="js/main.js?v=6"></script>
</body>
</html>
